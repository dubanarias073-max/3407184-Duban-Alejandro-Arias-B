<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Gestión de Cementerio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1>🕊 Sistema de Gestión de Cementerio</h1>

    <div class="card">
      <h2>Registrar Sepultura</h2>

      <form id="plot-form">
        <input type="text" id="name" placeholder="Nombre del fallecido" required>
        <select id="type" required></select>
        <input type="date" id="date" required>
        <input type="number" id="price" placeholder="Precio" required>
        <input type="number" id="years" placeholder="Años mantenimiento" required>
        <button type="submit">Guardar</button>
      </form>
    </div>

    <div class="card">
      <h2>Lista de Sepulturas</h2>
      <div id="plots-list"></div>
    </div>

  </div>

  <script type="module" src="./starter/main.js"></script>
</body>
</html>
